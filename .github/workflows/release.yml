name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Generate and Publish Temporary GPG Key
        run: |
          # Create batch file for key generation
          cat <<EOF > gpg-batch.txt
          Key-Type: RSA
          Key-Length: 2048
          Subkey-Type: RSA
          Subkey-Length: 2048
          Name-Real: CairoVolt Dev Team
          Name-Email: dev@cairovolt.com
          Expire-Date: 0
          Passphrase: temporarypassphrase
          %commit
          %echo done
          EOF
          
          # Generate GPG key
          gpg --batch --generate-key gpg-batch.txt
          
          # Configure GPG agent for loopback pinentry (critical for headless environments)
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          
          # Find GPG Key ID
          KEY_ID=$(gpg --list-keys --keyid-format LONG | grep 'pub' | awk '{print $2}' | cut -d'/' -f2)
          echo "Generated Key ID: $KEY_ID"
          
          # Send GPG key to public keyservers (required by Maven Central)
          gpg --keyserver keyserver.ubuntu.com --send-keys $KEY_ID
          gpg --keyserver keys.openpgp.org --send-keys $KEY_ID || true
          
          # Sleep to allow keyservers to synchronize
          sleep 15
        
      - name: Publish Package to Maven Central
        run: |
          mvn clean deploy -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Dgpg.passphrase="temporarypassphrase"
        env:
          MAVEN_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
